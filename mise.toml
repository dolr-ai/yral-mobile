#:schema https://mise.jdx.dev/schema/mise.json

# Per-app mise config for yral-mobile (Kotlin Multiplatform — Android + iOS).
# Inherits tools from the root monorepo mise.toml — only app-specific tools and env go here.
# When you cd into apps/yral-mobile/, mise automatically activates these tools and env vars.
#
# Prerequisites (not managed by mise — system-level):
#   - Android SDK (set ANDROID_HOME or sdk.dir in local.properties)
#   - Xcode + Command Line Tools (macOS only, for iOS targets)
#   - Android emulator (API 35, Google APIs, 12 GB disk)
#   - iOS simulator (iPhone, any recent iOS)
#
# First-time setup:  mise install && mise run setup

[tools]
# JDK — Gradle 8.14.4 + AGP 8.13.2 require JDK 17+; using JDK 21 LTS.
java = "temurin-21.0.11+10.0.LTS"
# Ruby — fastlane + CocoaPods need Ruby 3.x (macOS system Ruby 2.6 is too old).
ruby = "3.4.10"
# CocoaPods — iOS dependency manager (installed via gem, managed by mise).
cocoapods = "latest"
# SwiftLint — iOS lint (pre-commit hook + checks module).
swiftlint = "0.65.0"
# Maestro — mobile e2e test framework (Android + iOS flows).
maestro = "cli-2.6.1"
# kubectl and rust are inherited from the root monorepo mise.toml.

[env]
# KUBECONFIG — inherited from the root mise.toml (~/.kube/config).
# The checks module (KafkaExt.kt) auto-discovers ci-e2e-reader.kubeconfig
# in the repo root as a fallback if KUBECONFIG is not set.
# Override in mise.local.toml if needed.

# Kafka bootstrap server for e2e test assertions (checks module).
KAFKA_BOOTSTRAP = "kafka.yral.com:9092"

# Gradle — use the project wrapper (./gradlew) for all builds.
# These improve build performance and reliability.
GRADLE_OPTS = "-Dorg.gradle.daemon=true -Dorg.gradle.caching=true"

[tasks.setup]
description = "Install Ruby gems (fastlane) and run CocoaPods install for iOS"
run = '''
bundle install
cd iosApp && pod install
'''

[tasks.build]
description = "Assemble Android debug APK"
run = "./gradlew :androidApp:assembleDebug"

[tasks.build-release]
description = "Assemble Android release APK"
run = "./gradlew :androidApp:assembleRelease"

[tasks.test]
description = "Run all unit tests (root)"
run = "./gradlew test"

[tasks.test-auth]
description = "Run auth feature module tests (KMP, includes commonTest)"
run = "./gradlew :shared:features:auth:allTests"

[tasks.lint]
description = "Run ktlint + detekt"
run = "./gradlew ktlintCheck detekt"

[tasks.lint-fix]
description = "Auto-fix ktlint issues"
run = "./gradlew ktlintFormat"

[tasks.ios-build]
description = "Build the iOS XCFramework (shared Kotlin module)"
run = "./gradlew :iosSharedUmbrella:assembleXCFramework"

[tasks.ios-pod-install]
description = "Reinstall CocoaPods dependencies (run after adding/changing pods)"
run = "cd iosApp && pod install"

[tasks.checks]
description = "CI-equivalent full check suite (lint + unit tests + iOS xcodebuild + Android/iOS e2e)"
run = "./gradlew allChecks"

[tasks.clean]
description = "Clean all Gradle build outputs"
run = "./gradlew clean"
