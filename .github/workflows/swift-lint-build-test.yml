name: iOS Checks

permissions:
  contents: read
  packages: read

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  ios-checks:
    runs-on: macos-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Java (for Gradle)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install SwiftLint, CocoaPods, and xcbeautify
        run: brew install swiftlint cocoapods xcbeautify

      - name: Pin CocoaPods executable for Kotlin
        run: |
          printf 'kotlin.apple.cocoapods.bin=%s\n' "$(which pod)" > local.properties

      - name: Build KMM framework
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew :iosSharedUmbrella:podInstall --stacktrace
          # Pre-link the iOS simulator framework so all Kotlin Native .klib files
          # are compiled and cached in ~/.gradle before xcodebuild runs.
          # Without this, the "Build iosSharedUmbrella" script phase (declared in
          # iosSharedUmbrella.podspec) has no output declarations and therefore
          # re-invokes Gradle's syncFramework on every xcodebuild call, causing a
          # full Kotlin Native recompilation inside the test step. That fills the
          # CI runner disk and produces:
          #   libtool: can't write to output file (Input/output error)
          #   Failed to build cache for material-icons-extended.klib
          ./gradlew :iosSharedUmbrella:linkPodDebugFrameworkIosSimulatorArm64

      - name: pod install
        working-directory: iosApp
        run: pod install

      - name: Run SwiftLint
        working-directory: iosApp
        run: swiftlint

      - name: Resolve iOS Simulator destination
        id: sim
        run: |
          SIM_NAME=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name']:
                          print(d['name']); sys.exit(0)
          sys.exit(1)")
          echo "name=$SIM_NAME" >> "$GITHUB_OUTPUT"

      - name: Build and run tests
        working-directory: iosApp
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tells the "Build iosSharedUmbrella" script phase (from iosSharedUmbrella.podspec)
          # to skip re-invoking Gradle and use the already-linked framework from the
          # "Build KMM framework" step above. Without this flag, the podspec script would run
          # syncFramework again inside xcodebuild, re-compiling all Kotlin Native code and
          # exhausting the CI runner disk.
          OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED: 'YES'
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=${{ steps.sim.outputs.name }}' \
            -configuration Debug \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 120 \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            | xcbeautify --is-ci
