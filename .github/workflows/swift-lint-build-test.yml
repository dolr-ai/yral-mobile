name: iOS Checks

permissions:
  contents: read
  packages: read

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  ios-checks:
    runs-on: macos-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Java (for Gradle)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install SwiftLint and CocoaPods
        run: brew install swiftlint cocoapods

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-ios
          override: true

      - name: Add Rust iOS simulator targets
        run: rustup target add aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install cargo-lipo
        run: cargo install cargo-lipo

      - name: Build KMM framework
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :iosSharedUmbrella:podInstall --stacktrace

      - name: pod install
        working-directory: iosApp
        run: pod install

      - name: Run SwiftLint
        working-directory: iosApp
        run: swiftlint

      - name: Build (compile check)
        working-directory: iosApp
        run: |
          xcodebuild build \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            GITHUB_USERNAME="${{ github.actor }}" \
            GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Run tests
        working-directory: iosApp
        run: |
          xcodebuild test \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 120 \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            GITHUB_USERNAME="${{ github.actor }}" \
            GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            | xcpretty --test && exit ${PIPESTATUS[0]}
