name: Deploy staging apps on merge to main

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: read

# Serialize all staging deployments together. cancel-in-progress: false ensures
# the in-flight run completes before any queued run starts — critical for the
# Android version-code bump which reads and writes build.gradle.kts.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: macos-latest

    steps:
      # ══════════════════════════════════════════════════════════════════════
      # SETUP
      # ══════════════════════════════════════════════════════════════════════

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          ssh-key: ${{ secrets.DEPLOY_KEY_SSH_PRIVATE_KEY }}

      - name: Set up JDK
        id: setup-jdk
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: temurin

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.0"

      - name: Restore Gradle and Rust caches
        id: restore-tooling-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
            ~/.gradle/wrapper
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup
          key: ${{ runner.os }}-tooling-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle.properties', '**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-tooling-

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          echo "y" | sdkmanager --install "ndk;29.0.14206865" --channel=0
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Install CocoaPods and Fastlane
        run: gem install cocoapods fastlane --no-document

      - name: Pin CocoaPods executable for Kotlin
        run: printf 'kotlin.apple.cocoapods.bin=%s\n' "$(which pod)" > local.properties

      - name: Build KMM framework
        env:
          JAVA_HOME: ${{ steps.setup-jdk.outputs.java-home }}
        run: |
          ./gradlew :iosSharedUmbrella:podInstall --stacktrace
          ./gradlew :iosSharedUmbrella:linkPodDebugFrameworkIosSimulatorArm64

      - name: Pod install
        working-directory: iosApp
        run: pod install

      # ══════════════════════════════════════════════════════════════════════
      # DEPLOY
      # ══════════════════════════════════════════════════════════════════════

      # ── Android → Play Store ─────────────────────────────────────────────
      - name: Resolve Android version metadata
        run: |
          CURRENT=$(sed -nE 's/^[[:space:]]*versionCode = ([0-9]+) \/\/ ci:staging-version-code$/\1/p' ./androidApp/build.gradle.kts)
          if ! [[ "$CURRENT" =~ ^[0-9]+$ ]]; then
            echo "Error: could not read staging versionCode from build.gradle.kts, got: '$CURRENT'" >&2
            exit 1
          fi
          NEW=$((CURRENT + 1))

          CURRENT_VERSION=$(sed -nE "s/^[[:space:]]*versionName = \"([^\"]+)\" \/\/ ci:staging-version-name$/\1/p" ./androidApp/build.gradle.kts | head -n 1)
          if ! [[ "$CURRENT_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Error: could not read staging versionName semver from build.gradle.kts, got: '$CURRENT_VERSION'" >&2
            exit 1
          fi
          IFS=. read -r MAJOR MINOR PATCH <<<"$CURRENT_VERSION"
          VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          echo "staging versionCode: $CURRENT -> $NEW"
          echo "staging versionName -> $VERSION"
          sed -i '' -E "s/versionCode = [0-9]+ \/\/ ci:staging-version-code/versionCode = $NEW \/\/ ci:staging-version-code/" ./androidApp/build.gradle.kts
          sed -i '' "s/versionName = \"[^\"]*\" \/\/ ci:staging-version-name/versionName = \"$VERSION\" \/\/ ci:staging-version-name/" ./androidApp/build.gradle.kts
          echo "NEW_VERSION_CODE=$NEW" >> $GITHUB_ENV
          echo "NEW_VERSION_NAME=$VERSION" >> $GITHUB_ENV

      - name: Set up Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_ALPHA_KEYSTORE_CONTENTS_BASE_64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ./androidApp/my-alpha-release-key.keystore || \
          echo "$KEYSTORE_BASE64" | base64 -D > ./androidApp/my-alpha-release-key.keystore

      - name: Set up Android signing environment
        run: |
          echo "KEYSTORE_PASSWORD=${{ secrets.ANDROID_ALPHA_SIGNING_SECRET_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.ANDROID_ALPHA_SIGNING_SECRET_PASSWORD }}" >> $GITHUB_ENV
          echo "YRAL_BRANCH_KEY_TEST=${{ secrets.YRAL_BRANCH_KEY_TEST }}" >> $GITHUB_ENV
          echo "YRAL_BRANCH_KEY=${{ secrets.YRAL_BRANCH_KEY }}" >> $GITHUB_ENV
          echo "YRAL_META_INSTALL_REFERRER_DECRYPTION_KEY=${{ secrets.YRAL_META_INSTALL_REFERRER_DECRYPTION_KEY }}" >> $GITHUB_ENV

      - name: Build Android release bundle
        env:
          JAVA_HOME: ${{ steps.setup-jdk.outputs.java-home }}
        run: |
          ./gradlew clean androidApp:bundleStagingRelease

      - name: Upload Android Crashlytics mapping file
        env:
          JAVA_HOME: ${{ steps.setup-jdk.outputs.java-home }}
        run: ./gradlew androidApp:uploadCrashlyticsMappingFileStagingRelease

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/1035262663512/locations/global/workloadIdentityPools/github/providers/yral-mobile"
          service_account: "my-service-account@yral-mobile.iam.gserviceaccount.com"

      - name: Upload Android bundle to Play Store
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ steps.gcp-auth.outputs.credentials_file_path }}
          packageName: com.yral.android
          releaseFiles: androidApp/build/outputs/bundle/stagingRelease/androidApp-staging-release.aab
          track: production
          status: completed

      - name: Commit updated Android version metadata to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./androidApp/build.gradle.kts
          git commit -m "[skip ci] chore: bump staging version to $NEW_VERSION_NAME (versionCode $NEW_VERSION_CODE)"
          git pull --rebase origin main
          git push origin main

      # ── iOS → TestFlight ─────────────────────────────────────────────────
      - name: Resolve TestFlight release notes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const maxLength = 4000
            const stripHtmlComments = (text) =>
              (text || "").replace(/<!--[\s\S]*?-->/g, "").trim()

            let title = ""
            let body = ""
            let source = `commit ${context.sha}`

            try {
              const { data: pullRequests } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha
              })

              const mergedPullRequest =
                pullRequests
                  .filter((pr) => pr.merged_at)
                  .sort((a, b) => new Date(b.merged_at) - new Date(a.merged_at))[0] ||
                pullRequests[0]

              if (mergedPullRequest) {
                title = stripHtmlComments(mergedPullRequest.title)
                body = stripHtmlComments(mergedPullRequest.body)
                source = `PR #${mergedPullRequest.number}`
              }
            } catch (error) {
              core.warning(`Failed to resolve PR release notes: ${error.message}`)
            }

            if (!title) {
              title = stripHtmlComments(context.payload.head_commit?.message) || "Staging build"
            }

            let notes = body ? `${title}\n\n${body}` : title
            notes = notes
              .replace(/\r\n/g, "\n")
              .split("\n")
              .map((line) => line.trimEnd())
              .join("\n")
              .replace(/\n{3,}/g, "\n\n")
              .trim()

            if (notes.length > maxLength) {
              notes = `${notes.slice(0, maxLength - 1).trimEnd()}…`
            }

            core.info(`Using TestFlight release notes from ${source}`)
            core.exportVariable("TESTFLIGHT_STAGING_WHATS_NEW", notes)

      - name: Decrypt and import iOS distribution certificate
        run: |
          mkdir -p certs
          echo "${{ secrets.YRAL_DIST_CERT_P12_BASE64 }}" | base64 --decode > certs/Yral-Dist.p12
          echo "${{ secrets.YRAL_STAGING_DIST_PROF_BASE64 }}" | base64 --decode > "certs/Yral-Staging-Distribution.mobileprovision"
          security create-keychain -p "" build.keychain
          security import certs/Yral-Dist.p12 -k ~/Library/Keychains/build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -A
          security list-keychains -s ~/Library/Keychains/build.keychain
          security set-keychain-settings -lut 21600s ~/Library/Keychains/build.keychain
          security unlock-keychain -p "" ~/Library/Keychains/build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "certs/Yral-Staging-Distribution.mobileprovision" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS app and upload to TestFlight
        run: fastlane ios build_staging_testflight
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ vars.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ vars.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          TESTFLIGHT_STAGING_GROUP_NAME: Yral-Staging open testing
          GRADLE_OPTS: >-
            -Dorg.gradle.project.compose.ios.resources.platform=iphoneos
            -Dorg.gradle.project.compose.ios.resources.archs=arm64

      - name: Upload iOS Crashlytics dSYMs
        shell: zsh {0}
        run: |
          UPLOAD_SYMBOLS_SCRIPT="iosApp/Pods/FirebaseCrashlytics/upload-symbols"
          GOOGLE_SERVICE_INFO_PLIST="iosApp/Staging/GoogleService-Info.plist"

          if [[ ! -f "$UPLOAD_SYMBOLS_SCRIPT" ]]; then
            echo "Crashlytics upload-symbols script not found at $UPLOAD_SYMBOLS_SCRIPT" >&2; exit 1
          fi
          if [[ ! -f "$GOOGLE_SERVICE_INFO_PLIST" ]]; then
            echo "GoogleService-Info.plist not found at $GOOGLE_SERVICE_INFO_PLIST" >&2; exit 1
          fi

          setopt null_glob
          archive_candidates=("$HOME"/Library/Developer/Xcode/Archives/**/*.xcarchive(N))
          if (( ${#archive_candidates[@]} == 0 )); then
            echo "No Xcode archive found after TestFlight build" >&2; exit 1
          fi

          ARCHIVE_PATH=$(ls -td "${archive_candidates[@]}" | head -n 1)
          DSYMS_DIR="$ARCHIVE_PATH/dSYMs"

          if [[ ! -d "$DSYMS_DIR" ]]; then
            echo "dSYMs directory not found at $DSYMS_DIR" >&2; exit 1
          fi

          echo "Uploading Crashlytics dSYMs from $DSYMS_DIR"
          "$UPLOAD_SYMBOLS_SCRIPT" -gsp "$GOOGLE_SERVICE_INFO_PLIST" -p ios "$DSYMS_DIR"

      # ── Post-deploy ──────────────────────────────────────────────────────
      - name: Save Gradle and Rust caches
        if: ${{ success() && steps.restore-tooling-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
            ~/.gradle/wrapper
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup
          key: ${{ steps.restore-tooling-cache.outputs.cache-primary-key }}

      - name: Upload Fastlane build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gym-build-log
          path: ~/Library/Logs/gym/
          retention-days: 5
