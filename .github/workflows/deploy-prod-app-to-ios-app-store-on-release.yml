name: Yral-Prod (TestFlight)

on:
  release:
    types:
      - published

permissions:
  contents: write

# Serialize production App Store/TestFlight deployments so only one iOS prod
# release can publish to App Store Connect at a time.
concurrency:
  group: app-store-deploy-production
  cancel-in-progress: false

jobs:
  build-release-branch:
    if: contains(github.event.release.tag_name, 'iOS')
    runs-on: macos-latest

    steps:
      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION=$(echo "$TAG" | sed -E 's/^v?([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Could not extract valid semver from tag '$TAG', got: '$VERSION'" >&2
            exit 1
          fi
          echo "Extracted version: $VERSION from tag: $TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          ssh-key: ${{ secrets.DEPLOY_KEY_SSH_PRIVATE_KEY }}

      - name: Update iOS version files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' -E "/INFOPLIST_FILE = Prod\/Info\.plist;/,/PRODUCT_BUNDLE_IDENTIFIER = com\.yral\.iosApp;/ s/MARKETING_VERSION = [^;]+;/MARKETING_VERSION = ${VERSION};/" iosApp/iosApp.xcodeproj/project.pbxproj
          sed -i '' -E "/CFBundleShortVersionString/{n;s#<string>[^<]+</string>#<string>${VERSION}</string>#;}" iosApp/Prod/Info.plist
          echo "Updated production MARKETING_VERSION entries:"
          grep -nE "INFOPLIST_FILE = Prod/Info.plist;|MARKETING_VERSION =" iosApp/iosApp.xcodeproj/project.pbxproj
          echo "Updated production Info.plist version:"
          sed -n '15,24p' iosApp/Prod/Info.plist

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Set up Java (for Gradle)
        id: setup-jdk
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore Gradle and Rust caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
            ~/.gradle/wrapper
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup
          key: ${{ runner.os }}-tooling-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle.properties', '**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-tooling-

      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document

      - name: Pin CocoaPods executable for Kotlin
        run: |
          printf 'kotlin.apple.cocoapods.bin=%s\n' "$(which pod)" > local.properties

      - name: Run KMM podInstall
        run: |
          # Runs the Gradle task that Android Studio launches on sync.
          ./gradlew :iosSharedUmbrella:podInstall --stacktrace

      - name: pod install
        working-directory: iosApp
        run: pod install

      - name: Install Fastlane
        run: |
          gem install fastlane

      - name: Decrypt and import Distribution Certificate
        run: |
          mkdir -p certs
          echo "${{ secrets.YRAL_DIST_CERT_P12_BASE64 }}" | base64 --decode > certs/Yral-Dist.p12
          echo "${{ secrets.YRAL_PROD_DIST_PROF_BASE64 }}" | base64 --decode > "certs/Yral-Distribution.mobileprovision"

          security create-keychain -p "" build.keychain
          security import certs/Yral-Dist.p12 -k ~/Library/Keychains/build.keychain -P ${{ secrets.IOS_CERTIFICATE_PASSWORD }} -A
          security list-keychains -s ~/Library/Keychains/build.keychain
          security set-keychain-settings -lut 21600s ~/Library/Keychains/build.keychain
          security unlock-keychain -p "" ~/Library/Keychains/build.keychain
          
          # Import certificate
          security import certs/Yral-Dist.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          
          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "certs/Yral-Distribution.mobileprovision" ~/Library/MobileDevice/Provisioning\ Profiles/
  
      - name: Build & Upload to TestFlight
        run: fastlane ios build_production_testflight --verbose
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ vars.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ vars.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          GRADLE_OPTS: >-
            -Dorg.gradle.project.compose.ios.resources.platform=iphoneos
            -Dorg.gradle.project.compose.ios.resources.archs=arm64

      - name: Upload Crashlytics dSYMs
        shell: zsh {0}
        run: |
          UPLOAD_SYMBOLS_SCRIPT="iosApp/Pods/FirebaseCrashlytics/upload-symbols"
          GOOGLE_SERVICE_INFO_PLIST="iosApp/Prod/GoogleService-Info.plist"

          if [[ ! -f "$UPLOAD_SYMBOLS_SCRIPT" ]]; then
            echo "Crashlytics upload-symbols script not found at $UPLOAD_SYMBOLS_SCRIPT" >&2
            exit 1
          fi

          if [[ ! -f "$GOOGLE_SERVICE_INFO_PLIST" ]]; then
            echo "GoogleService-Info.plist not found at $GOOGLE_SERVICE_INFO_PLIST" >&2
            exit 1
          fi

          setopt null_glob
          archive_candidates=("$HOME"/Library/Developer/Xcode/Archives/**/*.xcarchive(N))
          if (( ${#archive_candidates[@]} == 0 )); then
            echo "No Xcode archive found after TestFlight build" >&2
            exit 1
          fi

          ARCHIVE_PATH=$(ls -td "${archive_candidates[@]}" | head -n 1)
          DSYMS_DIR="$ARCHIVE_PATH/dSYMs"

          if [[ ! -d "$DSYMS_DIR" ]]; then
            echo "dSYMs directory not found at $DSYMS_DIR" >&2
            exit 1
          fi

          echo "Uploading Crashlytics dSYMs from $DSYMS_DIR"
          "$UPLOAD_SYMBOLS_SCRIPT" -gsp "$GOOGLE_SERVICE_INFO_PLIST" -p ios "$DSYMS_DIR"

      - name: Commit version changes to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iosApp/iosApp.xcodeproj/project.pbxproj
          git add iosApp/Prod/Info.plist
          git add iosApp/Staging/Info-Staging.plist
          git commit -m "[skip ci] chore: bump iOS prod version to ${{ steps.version.outputs.version }}"
          git pull --rebase origin main
          git push origin main

      - name: Upload gym build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gym-build-log
          path: ~/Library/Logs/gym/
          retention-days: 5

      - name: Save Gradle and Rust caches
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
            ~/.gradle/wrapper
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup
          key: ${{ runner.os }}-tooling-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle.properties', '**/Cargo.lock', 'rust-toolchain.toml') }}
