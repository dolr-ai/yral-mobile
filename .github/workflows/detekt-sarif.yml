name: Detekt SARIF (debug)

on:
  workflow_dispatch:
  push:
    branches:
      - saikatdas0790/add-canisters-repo-and-more-cleanup

permissions:
  contents: read
  security-events: write

jobs:
  detekt:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: temurin

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Run detekt
        run: ./gradlew detekt --continue

      - name: List detekt outputs
        if: always()
        run: |
          echo "=== build/reports/detekt/ ==="
          find build/reports/detekt -type f 2>/dev/null || echo "(directory missing)"
          echo ""
          echo "=== Per-module detekt.sarif files ==="
          find . -path "*/build/reports/detekt/detekt.sarif" 2>/dev/null | head -30 || echo "(none found)"

      - name: Upload detekt SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/detekt/merge.sarif
