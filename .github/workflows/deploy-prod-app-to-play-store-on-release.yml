name: Deploy Prod Android App to Play Store on Release

on:
  release:
    types:
      - published

permissions:
  id-token: write
  contents: write

# Serialize production Play Store deployments so two releases published in
# quick succession cannot read the same versionCode and produce a duplicate.
concurrency:
  group: play-store-deploy-production
  cancel-in-progress: false

jobs:
  deploy-prod:
    if: contains(github.event.release.tag_name, 'Android')
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION=$(echo "$TAG" | sed -E 's/^v?([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Could not extract valid semver from tag '$TAG', got: '$VERSION'" >&2
            exit 1
          fi
          echo "Extracted version: $VERSION from tag: $TAG"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          ssh-key: ${{ secrets.DEPLOY_KEY_SSH_PRIVATE_KEY }}

      - name: Set up JDK
        id: setup-jdk
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install android SDK
        uses: android-actions/setup-android@v3

      - name: Install android NDK
        run: |
          echo "y" | sdkmanager --install "ndk;28.0.13004108" --channel=0
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/28.0.13004108" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/28.0.13004108" >> $GITHUB_ENV

      - name: Resolve and increment prod versionCode
        run: |
          CURRENT=$(grep -oP 'versionCode = \K[0-9]+(?= // ci:prod-version-code)' ./androidApp/build.gradle.kts)
          if ! [[ "$CURRENT" =~ ^[0-9]+$ ]]; then
            echo "Error: could not read prod versionCode from build.gradle.kts, got: '$CURRENT'" >&2
            exit 1
          fi
          NEW=$((CURRENT + 1))
          echo "prod versionCode: $CURRENT -> $NEW"
          echo "NEW_VERSION_CODE=$NEW" >> $GITHUB_ENV

      - name: Update version in build.gradle.kts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/versionCode = [0-9]\+ \/\/ ci:prod-version-code/versionCode = $NEW_VERSION_CODE \/\/ ci:prod-version-code/" ./androidApp/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\" \/\/ ci:prod-version-name/versionName = \"$VERSION\" \/\/ ci:prod-version-name/" ./androidApp/build.gradle.kts
          echo "Updated build.gradle.kts:"
          grep -E 'ci:prod-version' ./androidApp/build.gradle.kts

      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_CONTENTS_BASE_64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ./androidApp/my-release-key.keystore

      - name: Setup environment variables
        run: |
          echo "KEYSTORE_PASSWORD=${{ secrets.ANDROID_SIGNING_SECRET_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.ANDROID_SIGNING_SECRET_PASSWORD }}" >> $GITHUB_ENV
          echo "YRAL_BRANCH_KEY_TEST=${{ secrets.YRAL_BRANCH_KEY_TEST }}" >> $GITHUB_ENV
          echo "YRAL_BRANCH_KEY=${{ secrets.YRAL_BRANCH_KEY }}" >> $GITHUB_ENV
          echo "YRAL_META_INSTALL_REFERRER_DECRYPTION_KEY=${{ secrets.YRAL_META_INSTALL_REFERRER_DECRYPTION_KEY }}" >> $GITHUB_ENV

      - name: Clean project
        run: ./gradlew clean

      - name: Build AAB with Gradle
        run: ./gradlew androidApp:bundleProdRelease
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JAVA_HOME: ${{ steps.setup-jdk.outputs.java-home }}

      - name: Upload Crashlytics mapping file
        run: ./gradlew androidApp:uploadCrashlyticsMappingFileProdRelease
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JAVA_HOME: ${{ steps.setup-jdk.outputs.java-home }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1035262663512/locations/global/workloadIdentityPools/github/providers/yral-mobile'
          service_account: 'my-service-account@yral-mobile.iam.gserviceaccount.com'

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.yral.android.app
          releaseFiles: androidApp/build/outputs/bundle/prodRelease/androidApp-prod-release.aab
          track: production
          status: draft

      - name: Commit version changes to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./androidApp/build.gradle.kts
          git commit -m "[skip ci] chore: bump prod version to ${{ steps.version.outputs.version }} (versionCode $NEW_VERSION_CODE)"
          git push origin main
