name: Publish Rust lib to github packages

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  packages: write

jobs:
  publish-rust-lib:
    runs-on: macos-latest
    if: github.event.label.name == 'publish-rust-lib'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(grep '^version' shared/rust/rust-agent/rust-agent-uniffi/Cargo.toml \
            | sed 's/version = "\(.*\)"/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          if [ "$MINOR" -eq 9 ]; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
          else
            NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
          fi
          echo "Current version: $CURRENT"
          echo "New version: $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Check version not already published
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://maven.pkg.github.com/dolr-ai/yral-mobile/com/yral/shared/rust-agent/${NEW_VERSION}/rust-agent-${NEW_VERSION}.pom")
          echo "HTTP status for version ${NEW_VERSION}: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "::error::Version ${NEW_VERSION} is already published to GitHub Packages. Sync Cargo.toml with the latest published version and try again."
            exit 1
          fi

      - name: Update Cargo.toml version
        run: |
          sed -i '' -E "s/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/version = \"${NEW_VERSION}\"/" \
            shared/rust/rust-agent/rust-agent-uniffi/Cargo.toml
          grep '^version' shared/rust/rust-agent/rust-agent-uniffi/Cargo.toml

      - name: Update build.gradle.kts version
        run: |
          sed -i '' -E "s/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/version = \"${NEW_VERSION}\"/" \
            shared/rust/rust-agent/build.gradle.kts
          grep '^version' shared/rust/rust-agent/build.gradle.kts

      - name: Set up JDK
        uses: actions/setup-java@v3
        id: setup-jdk
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install android SDK
        uses: android-actions/setup-android@v3

      - name: Clean project
        run: ./gradlew -PisLocalRust=true clean

      - name: Publish to Github packages
        run: ./gradlew -PisLocalRust=true shared:rust:rust-agent:publish --no-configuration-cache
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JAVA_HOME: ${{ steps.setup-jdk.outputs.java-home }}

      - name: Update convention plugin version
        run: |
          sed -i '' -E "s/YRAL_RUST_VERSION = \"[0-9]+\.[0-9]+\.[0-9]+\"/YRAL_RUST_VERSION = \"${NEW_VERSION}\"/" \
            build-logic/convention/src/main/kotlin/SharedRustAgentConventionPlugin.kt
          grep 'const val YRAL_RUST_VERSION' build-logic/convention/src/main/kotlin/SharedRustAgentConventionPlugin.kt

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            shared/rust/rust-agent/rust-agent-uniffi/Cargo.toml \
            shared/rust/rust-agent/build.gradle.kts \
            build-logic/convention/src/main/kotlin/SharedRustAgentConventionPlugin.kt
          git commit -m "chore: bump rust lib version to ${NEW_VERSION}"
          git push origin HEAD:${{ github.head_ref }}
