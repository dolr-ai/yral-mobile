name: Checks

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write # detekt SARIF

jobs:
  all-checks:
    runs-on: macos-latest

    steps:
      # ══════════════════════════════════════════════════════════════════════
      # SETUP  (CI-only — not needed locally)
      # ══════════════════════════════════════════════════════════════════════

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        id: setup-jdk
        with:
          java-version: "21"
          distribution: temurin

      - name: Export JAVA_HOME
        run: echo "JAVA_HOME=${{ steps.setup-jdk.outputs.java-home }}" >> $GITHUB_ENV

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Restore Gradle and Rust caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
            ~/.gradle/wrapper
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup
          key: ${{ runner.os }}-tooling-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle.properties', '**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-tooling-

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          echo "y" | sdkmanager --install "ndk;29.0.14206865" --channel=0
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Install tools
        run: bash checks.sh install_tools

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_FOR_E2E_TESTS_BASE64 }}" | base64 -d > ci-e2e-reader.kubeconfig
          echo "KUBECONFIG=$GITHUB_WORKSPACE/ci-e2e-reader.kubeconfig" >> $GITHUB_ENV

      - name: Fetch Kafka password
        run: |
          PASS=$(kubectl get secret kafka-console -n kafka \
            -o jsonpath='{.data.password}' | base64 -d)
          echo "::add-mask::$PASS"
          echo "KAFKA_PASSWORD=$PASS" >> $GITHUB_ENV

      # ══════════════════════════════════════════════════════════════════════
      # LINT
      # ══════════════════════════════════════════════════════════════════════

      - name: Android ktlint
        run: bash checks.sh android_ktlint

      - name: Android detekt
        run: bash checks.sh android_detekt

      - name: Upload detekt SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/detekt/merge.sarif

      - name: iOS SwiftLint
        run: bash checks.sh ios_lint

      # ══════════════════════════════════════════════════════════════════════
      # SETUP iOS
      # ══════════════════════════════════════════════════════════════════════

      - name: Pin CocoaPods bin
        run: bash checks.sh ios_pin_cocoapods

      - name: Build KMM framework
        run: bash checks.sh ios_build_kmm

      - name: Pod install
        run: bash checks.sh ios_pod_install

      # ══════════════════════════════════════════════════════════════════════
      # UNIT TESTS
      # ══════════════════════════════════════════════════════════════════════

      - name: Android unit tests
        run: bash checks.sh android_unit_tests

      - name: iOS xcodebuild tests
        run: bash checks.sh ios_unit_tests

      # ══════════════════════════════════════════════════════════════════════
      # E2E TESTS
      # ══════════════════════════════════════════════════════════════════════

      - name: Port-forward Kafka bootstrap
        run: |
          bash checks.sh kafka_port_forward &
          sleep 3

      - name: Build Android staging debug APK
        run: bash checks.sh android_build_apk

      - name: Android E2E — feed scroll + Kafka assert
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          script: |
            adb install -r androidApp/build/outputs/apk/staging/debug/androidApp-staging-debug.apk
            bash checks.sh android_e2e

      - name: Build iOS staging app for simulator
        run: bash checks.sh ios_build_simulator

      - name: Boot simulator and install iOS staging app
        run: bash checks.sh ios_boot_install_simulator

      - name: iOS E2E — feed scroll + Kafka assert
        run: bash checks.sh ios_e2e
