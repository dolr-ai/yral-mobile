name: Deploy Apple App Store App to yral-staging on merge to main

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

# Serialize staging/TestFlight deployments so only one non-production iOS
# release can publish to App Store Connect at a time.
concurrency:
  group: app-store-deploy-staging
  cancel-in-progress: false

jobs:
  build-testflight-staging:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Resolve TestFlight release notes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const maxLength = 4000
            const stripHtmlComments = (text) =>
              (text || "").replace(/<!--[\s\S]*?-->/g, "").trim()

            let title = ""
            let body = ""
            let source = `commit ${context.sha}`

            try {
              const { data: pullRequests } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha
              })

              const mergedPullRequest =
                pullRequests
                  .filter((pullRequest) => pullRequest.merged_at)
                  .sort((left, right) => new Date(right.merged_at) - new Date(left.merged_at))[0] ||
                pullRequests[0]

              if (mergedPullRequest) {
                title = stripHtmlComments(mergedPullRequest.title)
                body = stripHtmlComments(mergedPullRequest.body)
                source = `PR #${mergedPullRequest.number}`
              }
            } catch (error) {
              core.warning(`Failed to resolve PR release notes: ${error.message}`)
            }

            if (!title) {
              title = stripHtmlComments(context.payload.head_commit?.message) || "Staging build"
            }

            let notes = title
            if (body) {
              notes = `${title}\n\n${body}`
            }

            notes = notes
              .replace(/\r\n/g, "\n")
              .split("\n")
              .map((line) => line.trimEnd())
              .join("\n")
              .replace(/\n{3,}/g, "\n\n")
              .trim()

            if (notes.length > maxLength) {
              notes = `${notes.slice(0, maxLength - 1).trimEnd()}…`
            }

            core.info(`Using TestFlight release notes from ${source}`)
            core.exportVariable("TESTFLIGHT_STAGING_WHATS_NEW", notes)

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Set up Java (for Gradle)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document

      - name: Pin CocoaPods executable for Kotlin
        run: |
          printf 'kotlin.apple.cocoapods.bin=%s\n' "$(which pod)" > local.properties

      - name: Run KMM podInstall
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Runs the Gradle task that Android Studio launches on sync.
          ./gradlew :iosSharedUmbrella:podInstall --stacktrace

      - name: pod install
        working-directory: iosApp
        run: pod install

      - name: Install Fastlane
        run: |
          gem install fastlane

      - name: Decrypt and import Distribution Certificate
        run: |
          mkdir -p certs
          echo "${{ secrets.YRAL_DIST_CERT_P12_BASE64 }}" | base64 --decode > certs/Yral-Dist.p12
          echo "${{ secrets.YRAL_STAGING_DIST_PROF_BASE64 }}" | base64 --decode > "certs/Yral-Staging-Distribution.mobileprovision"
          security create-keychain -p "" build.keychain
          security import certs/Yral-Dist.p12 -k ~/Library/Keychains/build.keychain -P ${{ secrets.IOS_CERTIFICATE_PASSWORD }} -A
          security list-keychains -s ~/Library/Keychains/build.keychain
          security set-keychain-settings -lut 21600s ~/Library/Keychains/build.keychain
          security unlock-keychain -p "" ~/Library/Keychains/build.keychain
          
          # Import certificate
          security import certs/Yral-Dist.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          
          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "certs/Yral-Staging-Distribution.mobileprovision" ~/Library/MobileDevice/Provisioning\ Profiles/
  
      - name: Build & Upload to TestFlight
        run: fastlane ios build_staging_testflight
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ vars.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ vars.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          TESTFLIGHT_STAGING_GROUP_NAME: Yral-Staging open testing
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRADLE_OPTS: >-
            -Dorg.gradle.project.compose.ios.resources.platform=iphoneos
            -Dorg.gradle.project.compose.ios.resources.archs=arm64

      - name: Upload Crashlytics dSYMs
        shell: zsh {0}
        run: |
          UPLOAD_SYMBOLS_SCRIPT="iosApp/Pods/FirebaseCrashlytics/upload-symbols"
          GOOGLE_SERVICE_INFO_PLIST="iosApp/Staging/GoogleService-Info.plist"

          if [[ ! -f "$UPLOAD_SYMBOLS_SCRIPT" ]]; then
            echo "Crashlytics upload-symbols script not found at $UPLOAD_SYMBOLS_SCRIPT" >&2
            exit 1
          fi

          if [[ ! -f "$GOOGLE_SERVICE_INFO_PLIST" ]]; then
            echo "GoogleService-Info.plist not found at $GOOGLE_SERVICE_INFO_PLIST" >&2
            exit 1
          fi

          setopt null_glob
          archive_candidates=("$HOME"/Library/Developer/Xcode/Archives/**/*.xcarchive(N))
          if (( ${#archive_candidates[@]} == 0 )); then
            echo "No Xcode archive found after TestFlight build" >&2
            exit 1
          fi

          ARCHIVE_PATH=$(ls -td "${archive_candidates[@]}" | head -n 1)
          DSYMS_DIR="$ARCHIVE_PATH/dSYMs"

          if [[ ! -d "$DSYMS_DIR" ]]; then
            echo "dSYMs directory not found at $DSYMS_DIR" >&2
            exit 1
          fi

          echo "Uploading Crashlytics dSYMs from $DSYMS_DIR"
          "$UPLOAD_SYMBOLS_SCRIPT" -gsp "$GOOGLE_SERVICE_INFO_PLIST" -p ios "$DSYMS_DIR"

      - name: Upload gym build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gym-build-log
          path: ~/Library/Logs/gym/
          retention-days: 5
