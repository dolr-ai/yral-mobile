name: Deploy Play Store App to yral-alpha on merge to main

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: read
  actions: write
  # This workflow updates a repository Actions variable via the REST API
  # (`/repos/{owner}/{repo}/actions/variables/...`), which requires `actions: write`
  # on the GITHUB_TOKEN. Keep this in sync with any variable update steps below.

# Serialize all Play Store deployments to prevent race conditions on the
# ALPHA_VERSION_CODE repo variable. Two concurrent runs could read the same
# stored value and compute the same versionCode, causing duplicate-versionCode
# rejections from the Play Store. `cancel-in-progress: false` ensures the
# in-flight run completes before the queued run starts (rather than aborting it).
concurrency:
  group: play-store-deploy-internal
  cancel-in-progress: false

jobs:
  build-app:
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      SENTRY_URL: ${{ vars.SENTRY_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with: 
          java-version: 21
          distribution: 'temurin'
          
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install android SDK
        uses: android-actions/setup-android@v3

      - name: Install android NDK
        run: |
          echo "y" | sdkmanager --install "ndk;28.0.13004108" --channel=0
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/28.0.13004108" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/28.0.13004108" >> $GITHUB_ENV

      - name: Resolve versionCode
        run: |
          # The authoritative versionCode is stored in the repository variable
          # ALPHA_VERSION_CODE (Settings → Variables → Actions). Using a repo variable
          # instead of committing back to build.gradle.kts avoids fighting branch
          # protection rules that require changes to go through pull requests.
          # The value in build.gradle.kts (versionCode = ...) is only the seed used
          # when the variable does not yet exist; once bootstrapped, the variable is
          # the single source of truth and is incremented after every successful upload.
          STORED="${{ vars.ALPHA_VERSION_CODE }}"
          if [ -z "$STORED" ]; then
            # First run: bootstrap from build.gradle.kts
            STORED=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' ./androidApp/build.gradle.kts)
            echo "No repo variable found; bootstrapping from build.gradle.kts: $STORED"
          fi
          NEW=$((STORED + 1))
          echo "versionCode: $STORED -> $NEW"
          sed -i "s/versionCode[[:space:]]*=[[:space:]]*[0-9]\+/versionCode = $NEW/" ./androidApp/build.gradle.kts
          echo "NEW_VERSION_CODE=$NEW" >> $GITHUB_ENV

      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_ALPHA_KEYSTORE_CONTENTS_BASE_64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ./androidApp/my-alpha-release-key.keystore

      - name: Setup environment variables
        run: |
          echo "KEYSTORE_PASSWORD=${{ secrets.ANDROID_ALPHA_SIGNING_SECRET_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.ANDROID_ALPHA_SIGNING_SECRET_PASSWORD }}" >> $GITHUB_ENV
          echo "YRAL_BRANCH_KEY_TEST=${{ secrets.YRAL_BRANCH_KEY_TEST }}" >> $GITHUB_ENV
          echo "YRAL_BRANCH_KEY=${{ secrets.YRAL_BRANCH_KEY }}" >> $GITHUB_ENV
          echo "YRAL_META_INSTALL_REFERRER_DECRYPTION_KEY=${{ secrets.YRAL_META_INSTALL_REFERRER_DECRYPTION_KEY }}" >> $GITHUB_ENV

      - name: Determine update priority from PR labels
        id: update-priority
        run: |
          PRIORITY="0"
          LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
          echo "PR labels: $LABELS"
          
          if echo "$LABELS" | grep -q "update-immediate"; then
            PRIORITY="4"
            echo "Found 'update-immediate' label, setting priority to 4"
          elif echo "$LABELS" | grep -q "update-flexible"; then
            PRIORITY="2"
            echo "Found 'update-flexible' label, setting priority to 2"
          else
            echo "No relevant update label found, using default priority 0"
          fi
          
          echo "update_priority=$PRIORITY" >> $GITHUB_OUTPUT
          echo "Set update priority to: $PRIORITY"

      - name: Clean project
        run: ./gradlew clean

      - name: Build APK
        run: ./gradlew androidApp:bundleStagingRelease
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JAVA_HOME: ${{ steps.setup-jdk.outputs.java-home }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1035262663512/locations/global/workloadIdentityPools/github/providers/yral-mobile'
          service_account: 'my-service-account@yral-mobile.iam.gserviceaccount.com'
          
      - name: Upload to Play Store
        id: Upload
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.yral.android
          releaseFiles: androidApp/build/outputs/bundle/stagingRelease/androidApp-staging-release.aab
          track: internal
          status: completed
          inAppUpdatePriority: ${{ steps.update-priority.outputs.update_priority }}

      - name: Persist new versionCode to repo variable
        run: |
          # Update (or create) the ALPHA_VERSION_CODE Actions variable so the next
          # run picks up the incremented value without any commit to the repo.
          # PATCH upserts: it creates the variable if absent, updates it if present.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/ALPHA_VERSION_CODE" \
            -d "{\"name\":\"ALPHA_VERSION_CODE\",\"value\":\"$NEW_VERSION_CODE\"}")
          if [ "$HTTP_STATUS" = "204" ]; then
            echo "ALPHA_VERSION_CODE updated to $NEW_VERSION_CODE"
          else
            # Variable may not exist yet; fall back to POST (create)
            curl -s -f \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/actions/variables" \
              -d "{\"name\":\"ALPHA_VERSION_CODE\",\"value\":\"$NEW_VERSION_CODE\"}" \
            && echo "ALPHA_VERSION_CODE created at $NEW_VERSION_CODE" \
            || echo "Warning: failed to persist ALPHA_VERSION_CODE (HTTP $HTTP_STATUS)"
          fi