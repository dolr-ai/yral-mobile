name: Deploy Play Store App to yral-alpha on merge to main

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: read

# Serialize yral-alpha Play Store deployments so two concurrent runs cannot
# read the same versionCode from build.gradle.kts and produce a duplicate.
# cancel-in-progress: false ensures the in-flight run completes before the
# queued run starts (rather than aborting it).
concurrency:
  group: play-store-deploy-staging
  cancel-in-progress: false

jobs:
  build-app:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          ssh-key: ${{ secrets.DEPLOY_KEY_SSH_PRIVATE_KEY }}

      - name: Set up JDK
        id: setup-jdk
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Restore Gradle and Rust caches
        id: restore-tooling-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
            ~/.gradle/wrapper
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup
          key: ${{ runner.os }}-tooling-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle.properties', '**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-tooling-

      - name: Install android SDK
        uses: android-actions/setup-android@v3

      - name: Install android NDK
        run: |
          echo "y" | sdkmanager --install "ndk;29.0.14206865" --channel=0
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Resolve version metadata
        run: |
          CURRENT=$(sed -nE 's/^[[:space:]]*versionCode = ([0-9]+) \/\/ ci:staging-version-code$/\1/p' ./androidApp/build.gradle.kts)
          if ! [[ "$CURRENT" =~ ^[0-9]+$ ]]; then
            echo "Error: could not read staging versionCode from build.gradle.kts, got: '$CURRENT'" >&2
            exit 1
          fi
          NEW=$((CURRENT + 1))

          CURRENT_VERSION=$(sed -nE "s/^[[:space:]]*versionName = \"([^\"]+)\" \/\/ ci:staging-version-name$/\1/p" ./androidApp/build.gradle.kts | head -n 1)
          if ! [[ "$CURRENT_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Error: could not read staging versionName semver from build.gradle.kts, got: '$CURRENT_VERSION'" >&2
            exit 1
          fi
          IFS=. read -r MAJOR MINOR PATCH <<<"$CURRENT_VERSION"
          VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          echo "staging versionCode: $CURRENT -> $NEW"
          echo "staging versionName -> $VERSION"
          sed -i '' -E "s/versionCode = [0-9]+ \/\/ ci:staging-version-code/versionCode = $NEW \/\/ ci:staging-version-code/" ./androidApp/build.gradle.kts
          sed -i '' "s/versionName = \"[^\"]*\" \/\/ ci:staging-version-name/versionName = \"$VERSION\" \/\/ ci:staging-version-name/" ./androidApp/build.gradle.kts
          echo "NEW_VERSION_CODE=$NEW" >> $GITHUB_ENV
          echo "NEW_VERSION_NAME=$VERSION" >> $GITHUB_ENV

      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_ALPHA_KEYSTORE_CONTENTS_BASE_64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ./androidApp/my-alpha-release-key.keystore || \
          echo "$KEYSTORE_BASE64" | base64 -D > ./androidApp/my-alpha-release-key.keystore

      - name: Setup environment variables
        run: |
          echo "KEYSTORE_PASSWORD=${{ secrets.ANDROID_ALPHA_SIGNING_SECRET_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.ANDROID_ALPHA_SIGNING_SECRET_PASSWORD }}" >> $GITHUB_ENV
          echo "YRAL_BRANCH_KEY_TEST=${{ secrets.YRAL_BRANCH_KEY_TEST }}" >> $GITHUB_ENV
          echo "YRAL_BRANCH_KEY=${{ secrets.YRAL_BRANCH_KEY }}" >> $GITHUB_ENV
          echo "YRAL_META_INSTALL_REFERRER_DECRYPTION_KEY=${{ secrets.YRAL_META_INSTALL_REFERRER_DECRYPTION_KEY }}" >> $GITHUB_ENV

      - name: Clean project
        run: ./gradlew clean

      - name: Build APK
        run: ./gradlew androidApp:bundleStagingRelease
        env:
          JAVA_HOME: ${{ steps.setup-jdk.outputs.java-home }}

      - name: Upload Crashlytics mapping file
        run: ./gradlew androidApp:uploadCrashlyticsMappingFileStagingRelease
        env:
          JAVA_HOME: ${{ steps.setup-jdk.outputs.java-home }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1035262663512/locations/global/workloadIdentityPools/github/providers/yral-mobile'
          service_account: 'my-service-account@yral-mobile.iam.gserviceaccount.com'

      - name: Upload to Play Store
        id: Upload
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.yral.android
          releaseFiles: androidApp/build/outputs/bundle/stagingRelease/androidApp-staging-release.aab
          track: production
          status: completed

      - name: Commit updated staging version metadata to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./androidApp/build.gradle.kts
          git commit -m "[skip ci] chore: bump staging version to $NEW_VERSION_NAME (versionCode $NEW_VERSION_CODE)"
          git pull --rebase origin main
          git push origin main

      - name: Save Gradle and Rust caches
        if: ${{ success() && github.ref == 'refs/heads/main' && steps.restore-tooling-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
            ~/.gradle/wrapper
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup
          key: ${{ steps.restore-tooling-cache.outputs.cache-primary-key }}
